name: Test invalid JSON in fail mode
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: validate
        uses: .
        with:
          base_dir: tests/fixtures/invalid
          mode: "fail"
          use_gitignore: "false"
          comment: "false"
        continue-on-error: true

      - name: Assert action failed (invalid JSON should cause failure)
        env:
          OUTCOME: ${{ steps.validate.outcome }}
          SUCCESS: ${{ steps.validate.outputs.success }}
        run: |
          echo "outcome: $OUTCOME"
          echo "success: $SUCCESS"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid JSON but outcome was '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed on invalid JSON"
