name: Test specific files input
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: validate
        uses: .
        with:
          files: |
            tests/fixtures/valid/sample.json
            tests/fixtures/valid/sample.yaml
          use_gitignore: "false"
          comment: "false"

      - name: Assert success output is true for specific valid files
        env:
          ACTUAL: ${{ steps.validate.outputs.success }}
        run: |
          echo "actual: $ACTUAL"
          if [ "$ACTUAL" != "true" ]; then
            echo "FAIL: expected success='true' for specific valid files but got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
