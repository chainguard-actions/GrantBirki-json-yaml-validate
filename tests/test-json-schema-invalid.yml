name: Test JSON schema validation with invalid file
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: validate
        uses: .
        with:
          base_dir: tests/fixtures/schema-invalid
          json_schema: tests/fixtures/schemas/person.schema.json
          json_schema_version: "draft-07"
          mode: "fail"
          use_gitignore: "false"
          comment: "false"
        continue-on-error: true

      - name: Assert action failed for schema-invalid JSON
        env:
          OUTCOME: ${{ steps.validate.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail for schema-invalid JSON but outcome was '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed for schema-invalid JSON"
